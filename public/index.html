<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remembering Ollie — Pet Memorial Songs</title>
  <meta http-equiv="refresh" content="3;url=https://www.rememberingollie.com">
  <meta name="description" content="Custom memorial songs for beloved pets. A heartfelt tribute created with love.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #FAF6F0 0%, #F5EDE3 50%, #FFF8F0 100%);
      color: #5C4033;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(212, 165, 116, 0.25);
      box-shadow: 0 8px 32px rgba(92, 64, 51, 0.08);
    }
    .paw {
      font-size: 36px;
      margin-bottom: 16px;
      opacity: 0.7;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #5C4033;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 15px;
      font-style: italic;
      color: #8B7355;
      margin-bottom: 28px;
    }
    .redirect-text {
      font-size: 14px;
      color: #A08B6E;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #D4A574, #C49464);
      color: white;
      text-decoration: none;
      border-radius: 28px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(212, 165, 116, 0.35);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 165, 116, 0.45);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="paw">🐾</div>
    <h1>Remembering Ollie</h1>
    <p class="tagline">Custom memorial songs for beloved pets</p>
    <p class="redirect-text">Redirecting you to our home page...</p>
    <a href="https://www.rememberingollie.com" class="btn">Visit Remembering Ollie</a>
  </div>
</body>
</html>
